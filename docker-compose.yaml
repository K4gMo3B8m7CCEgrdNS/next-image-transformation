services:
  api:
    build: .
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - IMGPROXY_URL=http://imgproxy:8080
      - SUPABASE_PUBLIC_STORAGE_BASE=${SUPABASE_PUBLIC_STORAGE_BASE}
      - MAX_IMAGE_WIDTH=${MAX_IMAGE_WIDTH:-2048}
      - MAX_IMAGE_HEIGHT=${MAX_IMAGE_HEIGHT:-2048}
    healthcheck:
      test: "wget -qO- http://localhost:3000/health || exit 1"
      interval: 2s
      timeout: 10s
      retries: 5
    depends_on:
      imgproxy:
        condition: service_healthy
  imgproxy:
    image: darthsim/imgproxy
    environment:
      - IMGPROXY_JPEG_PROGRESSIVE=true
      - IMGPROXY_USE_ETAG=true
      - ALLOWED_REMOTE_DOMAINS=${ALLOWED_REMOTE_DOMAINS}
      - IMGPROXY_AUTO_WEBP=true
      - IMGPROXY_AUTO_AVIF=true
      - IMGPROXY_ENABLE_WEBP_DETECTION=true
      - IMGPROXY_ENABLE_AVIF_DETECTION=true
      - IMGPROXY_PREFERRED_FORMATS=avif,webp,jpeg,png,gif
      - IMGPROXY_ALLOWED_SOURCES=${IMGPROXY_ALLOWED_SOURCES:-https://${ALLOWED_REMOTE_DOMAINS}/}
      - IMGPROXY_MAX_SRC_RESOLUTION=${IMGPROXY_MAX_SRC_RESOLUTION:-50}
      - IMGPROXY_MAX_SRC_FILE_SIZE=${IMGPROXY_MAX_SRC_FILE_SIZE:-10485760}
      - IMGPROXY_MAX_ANIMATION_FRAMES=${IMGPROXY_MAX_ANIMATION_FRAMES:-1}
      - IMGPROXY_DOWNLOAD_TIMEOUT=${IMGPROXY_DOWNLOAD_TIMEOUT:-5}
      - IMGPROXY_READ_REQUEST_TIMEOUT=${IMGPROXY_READ_REQUEST_TIMEOUT:-10}
      - IMGPROXY_WRITE_RESPONSE_TIMEOUT=${IMGPROXY_WRITE_RESPONSE_TIMEOUT:-10}
    healthcheck:
      test: [ "CMD", "imgproxy", "health" ]
      interval: 2s
      timeout: 10s
      retries: 5
